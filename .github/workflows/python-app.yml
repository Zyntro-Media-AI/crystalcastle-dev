name: Python CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  calculate_and_test:
    name: Run Calculations & Tests
    runs-on: ubuntu-latest
    outputs:
      test_result: ${{ steps.run_calc.outputs.status }}
      calc_summary: ${{ steps.run_calc.outputs.summary }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          [ -f requirements.txt ] && pip install -r requirements.txt

      - name: Run Core Calculations
        id: run_calc
        run: |
          # รัน Python และเก็บผลลัพธ์พร้อมดักจับ exit code ไม่ให้สเตปพังทันที
          if python main_calculation.py --output-step; then
            echo "status=🟢 Success" >> "$GITHUB_OUTPUT"
            echo "summary=All calculations completed successfully." >> "$GITHUB_OUTPUT"
          else
            echo "status=🔴 Failed" >> "$GITHUB_OUTPUT"
            echo "summary=Python script crashed or returned a non-zero exit code." >> "$GITHUB_OUTPUT"
            exit 1 # สั่งให้ Job นี้พังตามจริงหลังจากส่ง Output แล้ว
          fi

  display_results:
    name: Display Execution Summary
    runs-on: ubuntu-latest
    needs: calculate_and_test
    if: always()
    
    steps:
      - name: Generate GitHub Summary
        run: |
          cat << 'EOF' >> "$GITHUB_STEP_SUMMARY"
          ### 📊 สรุปผลการประมวลผล Pipeline
          - **สถานะการคำนวณ:** ${{ needs.calculate_and_test.outputs.test_result || '❌ Unknown Failure' }}
          - **รายละเอียด:** ${{ needs.calculate_and_test.outputs.calc_summary || 'No summary available.' }}
          EOF
